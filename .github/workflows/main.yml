name: Build Aura APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # [သေချာပြင်ဆင်ထားသည့်နေရာ]
    # မင်းရဲ့ အရင်းမြစ်ကုဒ် (build.gradle) ကို မထိခိုက်စေဘဲ Gradle Version 8.7 Wrapper ကို သီးသန့် အရင်ဆောက်ခိုင်းခြင်းဖြစ်ပါတယ်
    - name: Generate Gradle Wrapper safely
      run: gradle wrapper --gradle-version 8.7 --no-project-version
    
    - name: Grant execute permission
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Aura-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
