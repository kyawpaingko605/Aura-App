name: Build Aura APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # Cache စနစ်ထည့်ခြင်းဖြင့် နောက်တစ်ကြိမ် build ရင် dependency တွေကို ထပ်မံ download ဆွဲစရာမလိုတော့ဘဲ မြန်ဆန်သွားစေပါတယ်
        cache: 'gradle'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission
      run: chmod +x gradlew
    
    - name: Build Debug APK
      # Memory ပြဿနာ မတက်စေဖို့ ဤနေရာမှာ Gradle JVM arguments (Memory) ကို တိုးမြှင့်သတ်မှတ်ပေးလိုက်ပါတယ်
      env:
        GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"
      run: ./gradlew assembleDebug --stacktrace --info
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Aura-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
