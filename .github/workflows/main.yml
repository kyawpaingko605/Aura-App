name: Build Aura APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # [သေချာပြင်ဆင်ထားသည့်နေရာ] 
    # Gradle 9.6.1 ကို လုံးဝကျော်ပြီး၊ တရားဝင် Gradle 8.7 ကို Runner စက်ထဲ တိုက်ရိုက် သွင်းလိုက်ခြင်းဖြစ်ပါတယ်
    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    # Gradle 8.7 စက်ထဲရောက်သွားပြီမို့ လုံခြုံစိတ်ချစွာ wrapper ဆောက်နိုင်ပါပြီ
    - name: Generate Gradle Wrapper
      run: gradle wrapper
    
    - name: Grant execute permission
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Aura-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
